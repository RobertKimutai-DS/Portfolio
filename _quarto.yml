project:
  type: website
  output-dir: docs

execute:
  freeze: auto

website:
  title: "Robert Kimutai"
  site-url: https://robertkimutai.netlify.app
  description: "Engineer | Data Scientist | Researcher | Developer"
  favicon: assets/images/favicon.png

  navbar:
    pinned: true
    background: dark
    logo: assets/images/profile_pic.jpg
    left:
      - text: "Home"
        file: index.qmd
      - text: "Portfolio"
        file: portfolio/index.qmd
      - text: "Resume"
        file: resume/index.qmd
      - text: "Blog"
        file: blog/index.qmd
    right:
      - icon: github
        href: https://github.com/RobertKimutai-DS
      - icon: linkedin
        href: https://www.linkedin.com/in/robert-kimutai-921608330/
      - icon: envelope
        aria-label: email
        href: "mailto:robert.kimutai.ds@gmail.com"

  page-footer:
    left: |
      &copy; 2026 Robert Kimutai &middot; Built with [Quarto](https://quarto.org)
    right: |
      [GitHub](https://github.com/RobertKimutai-DS) &middot; [LinkedIn](https://www.linkedin.com/in/robert-kimutai-921608330/) &middot; [Kaggle](https://www.kaggle.com/kimutairobert)

format:
  html:
    theme:
      light: [flatly, assets/css/styles.scss]
      dark: [darkly, assets/css/styles.scss]
    toc: false
    mainfont: "Segoe UI"
    monofont: "Fira Code"
    highlight-style: github
    code-copy: true
    page-layout: full
    grid:
      sidebar-width: 0px
      body-width: 1200px
    include-in-header:
      - text: |
          <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    include-after-body:
      - text: |
          <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
          <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
          <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
          <script src="https://unpkg.com/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
          <script src="/assets/javascript/main.js"></script>

editor: visual
